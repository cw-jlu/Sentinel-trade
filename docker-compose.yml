services:
  # ─────────────────────────────────────────────
  # Kafka (KRaft mode, single node, no ZooKeeper)
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: sentinel-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    mem_limit: 2g
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis (hot data, TTL-based eviction)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save ""
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ClickHouse (warm data, TTL=7d)
  # ─────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: sentinel-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: sentinel_trade
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    mem_limit: 3g
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MySQL (cold data, permanent aggregated K-lines)
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: sentinel-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: sentinel123
      MYSQL_DATABASE: sentinel_trade
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    mem_limit: 2g
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psentinel123"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Data Ingestion (Python / FastAPI)
  # ─────────────────────────────────────────────
  ingestion:
    build: ./ingestion
    container_name: sentinel-ingestion
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BINANCE_WS_URL: wss://stream.binance.com:9443/ws/btcusdt@aggTrade
      LOG_LEVEL: INFO
      HTTP_PROXY: http://host.docker.internal:6478
      HTTPS_PROXY: http://host.docker.internal:6478
      ALL_PROXY: socks5://host.docker.internal:6478
    mem_limit: 512m
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Flink JobManager
  # ─────────────────────────────────────────────
  flink-jobmanager:
    image: flink:1.17.0
    container_name: sentinel-flink-jm
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        rest.bind-address: 0.0.0.0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Flink TaskManager
  # ─────────────────────────────────────────────
  flink-taskmanager:
    image: flink:1.17.0
    container_name: sentinel-flink-tm
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 2048m
        taskmanager.numberOfTaskSlots: 4
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    mem_limit: 2g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Flink Job 自动提交（构建 jar 并提交到集群）
  # ─────────────────────────────────────────────
  flink-job-submitter:
    build: ./stream-processing
    container_name: sentinel-flink-job
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      FLINK_JOBMANAGER_URL: http://flink-jobmanager:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: ["/bin/bash", "/opt/flink/usrlib/submit-job.sh"]
    volumes:
      - ./stream-processing/submit-job.sh:/opt/flink/usrlib/submit-job.sh:ro
    restart: on-failure

  # ─────────────────────────────────────────────
  # Backend Service (Spring Boot)
  # ─────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: sentinel-backend
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sentinel_trade?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: sentinel123
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: sentinel_trade
    mem_limit: 1g
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Frontend (Vue.js / Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sentinel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    mem_limit: 256m
    restart: unless-stopped

# ─────────────────────────────────────────────
# Named volumes for data persistence
# ─────────────────────────────────────────────
volumes:
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local
  mysql-data:
    driver: local

# ─────────────────────────────────────────────
# Shared network
# ─────────────────────────────────────────────
networks:
  default:
    name: sentinel-network
    driver: bridge
